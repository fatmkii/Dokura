services:
  dokura:
    build:
      context: ../..
    image: dokura:stage-04
    environment:
      DOKURA_CONTENT_DIR: /data/content
      DOKURA_METADATA_DIR: /data/metadata
      DOKURA_CONFIG_DIR: /data/config
    ports:
      - "127.0.0.1:${DOKURA_STAGE4_PORT:-18004}:8000"
    volumes:
      - ${DOKURA_STAGE4_CONTENT:?required}:/data/content:ro
      - ${DOKURA_STAGE4_METADATA:?required}:/data/metadata
      - ${DOKURA_STAGE4_CONFIG:?required}:/data/config
    healthcheck:
      test: ["CMD", ".venv/bin/python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=2)"]
      interval: 2s
      timeout: 2s
      retries: 20
