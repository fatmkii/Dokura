services:
  dokura:
    build:
      context: ../..
    image: dokura:release
    environment:
      DOKURA_CONTENT_DIR: /data/content
      DOKURA_METADATA_DIR: /data/metadata
      DOKURA_CONFIG_DIR: /data/config
    ports:
      - "${DOKURA_STAGE9_PORT:-18009}:8000"
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ${DOKURA_STAGE9_DATA:?}/Content:/data/content:ro
      - ${DOKURA_STAGE9_DATA:?}/MetaData:/data/metadata
      - ${DOKURA_STAGE9_DATA:?}/Config:/data/config
    healthcheck:
      test: ["CMD", ".venv/bin/python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=2)"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 2s
